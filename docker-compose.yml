services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: x-car-database
    environment:
      - POSTGRES_USER=x_car
      - POSTGRES_PASSWORD=x_car
      - POSTGRES_DB=x_car
    ports:
      - 5432:5432
    volumes:
      - x_car_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: x-car-redis
    ports:
      - "6379:6379" 
    volumes:
      - redis_data:/data

volumes:
  x_car_pg_data:
  redis_data: